<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Câmera Web App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #f4f4f9;
      margin: 0;
      padding: 20px;
    }
    h2 { color: #333; }
    #video, #canvas {
      width: 100%;
      max-width: 400px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      background-color: #000;
    }
    #canvas { display: none; }
    .btn-container {
      margin-top: 15px;
      display: flex;
      gap: 10px;
    }
    button {
      padding: 12px 24px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.2s;
    }
    #snapBtn { background-color: #007bff; color: white; }
    #snapBtn:hover { background-color: #0056b3; }
    #saveBtn { background-color: #28a745; color: white; display: none; }
    #saveBtn:hover { background-color: #218838; }
    #retakeBtn { background-color: #dc3545; color: white; display: none; }
    #retakeBtn:hover { background-color: #c82333; }
    #status {
      margin-top: 15px;
      font-size: 14px;
      font-weight: bold;
      color: #666;
    }
  </style>
</head>
<body>

  <h2>Câmera Web App</h2>
  
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <div class="btn-container">
    <button id="snapBtn" onclick="tirarFoto()">Tirar Foto</button>
    <button id="retakeBtn" onclick="repetirFoto()">Tirar Outra</button>
    <button id="saveBtn" onclick="enviarFoto()">Salvar Foto</button>
  </div>

  <div id="status">Aguardando permissão da câmera...</div>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const snapBtn = document.getElementById('snapBtn');
    const saveBtn = document.getElementById('saveBtn');
    const retakeBtn = document.getElementById('retakeBtn');
    const statusDiv = document.getElementById('status');

    let streamGlobal = null;

    // Força a ativação da câmera traseira (environment)
    navigator.mediaDevices.getUserMedia({ 
      video: { 
        facingMode: { ideal: "environment" } 
      }, 
      audio: false 
    })
    .then(stream => {
      streamGlobal = stream;
      video.srcObject = stream;
      video.play().catch(e => console.log("Erro ao iniciar reprodução:", e));
      statusDiv.innerText = "Câmera traseira carregada!";
    })
    .catch(err => {
      console.log("Câmera traseira ideal não encontrada, tentando genérica...", err);
      // Fallback caso o dispositivo não mapeie a câmera traseira de forma clássica
      navigator.mediaDevices.getUserMedia({ video: true, audio: false })
      .then(stream => {
        streamGlobal = stream;
        video.srcObject = stream;
        statusDiv.innerText = "Câmera padrão carregada!";
      })
      .catch(e => {
        statusDiv.innerText = "Erro ao acessar câmera: " + e.message;
      });
    });

    function tirarFoto() {
      const context = canvas.getContext('2d');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      
      context.drawImage(video, 0, 0, canvas.width, canvas.height);
      
      video.style.display = 'none';
      canvas.style.display = 'block';
      
      snapBtn.style.display = 'none';
      saveBtn.style.display = 'inline-block';
      retakeBtn.style.display = 'inline-block';
      statusDiv.innerText = "Foto capturada! Deseja salvar?";
    }

    function repetirFoto() {
      video.style.display = 'block';
      canvas.style.display = 'none';
      
      snapBtn.style.display = 'inline-block';
      saveBtn.style.display = 'none';
      retakeBtn.style.display = 'none';
      statusDiv.innerText = "Câmera ativa.";
    }

    function enviarFoto() {
      statusDiv.innerText = "Salvando no Google Drive... Por favor, aguarde.";
      saveBtn.disabled = true;
      retakeBtn.disabled = true;

      const dataURL = canvas.toDataURL('image/png');
      
      // Nova URL da sua implementação do Apps Script integrada de forma nativa
      const URL_SCRIPT = https://script.google.com/macros/s/AKfycby6Dklk9UNTYYnKWVBYogqOniPDd5S71QT_tBZ7kLx3IjCgHmNOp-93qib2Rh_6-sSvlQ/exec;
      fetch(URL_SCRIPT, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain'
        },
        body: JSON.stringify({ imagem: dataURL })
      })
      .then(res => res.json())
      .then(dados => {
        if (dados.sucesso) {
          statusDiv.innerHTML = "Foto salva com sucesso! Registro adicionado à planilha.";
        } else {
          statusDiv.innerText = "Erro ao salvar no Google: " + dados.erro;
        }
        setTimeout(repetirFoto, 3000);
      })
      .catch(err => {
        // Fallback de exibição amigável para o navegador
        statusDiv.innerText = "Foto enviada! Aguarde alguns instantes e verifique seu Drive/Planilha.";
        setTimeout(repetirFoto, 3000);
      })
      .finally(() => {
        saveBtn.disabled = false;
        retakeBtn.disabled = false;
      });
    }
  </script>
</body>
</html>
